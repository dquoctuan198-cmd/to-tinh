<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空许愿</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 星空背景 -->
    <canvas id="starfield"></canvas>
    
    <!-- 流星效果 -->
    <canvas id="meteors"></canvas>
    
    <!-- 烟花效果 -->
    <canvas id="fireworks"></canvas>
    
    <!-- 主内容区 -->
    <div class="container">
        <!-- 初始引导区 -->
        <div id="intro-section" class="section active">
            <h1 class="intro-title">星空许愿</h1>
            <p class="intro-subtitle">在浩瀚星空中，向TA许下最真挚的愿望</p>
            <div class="input-container">
                <input type="text" id="name-input" placeholder="在这里输入TA的名字">
                <button id="start-btn" class="btn-primary">开始许愿</button>
            </div>
        </div>
        
        <!-- 名字显示区 -->
        <div id="name-section" class="section hidden">
            <div id="name-display" class="name-display"></div>
        </div>
        
        <!-- 表白文字区 -->
        <div id="confession-section" class="section hidden">
            <div id="confession-text" class="confession-text">
                有句话我在心里练习了好多遍，今天想认真说给你听。<br><br>
                在没遇见你之前，我的日子就像没开灯的房间，安静却少了点温度。直到你出现，像一束温柔的光闯进来，把我的星空都点亮了。我开始期待每天的相遇，会偷偷记下你喜欢的小事，会因为你的开心而更开心。<br><br>
                我喜欢你，不是一时兴起，是深思熟虑后的真心。<span id="her-name">[她的名字]</span>，你愿意做我的女朋友，让我往后的星空永远有你吗？
            </div>
            <div class="button-group">
                <button id="yes-btn" class="btn-yes">愿意</button>
                <button id="no-btn" class="btn-no">不愿意</button>
            </div>
        </div>
        
        <!-- 烟花庆祝区 -->
        <div id="celebration-section" class="section hidden">
            <div class="celebration-text">
                <h2>太棒了！</h2>
                <p>让我们一起点亮这片星空！</p>
            </div>
        </div>
    </div>
    
    <!-- 底部功能区 -->
    <div class="footer">
        <button id="restart-btn" class="btn-restart">重新开始</button>
    </div>
    
    <!-- 音频元素 -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://www.aigei.com/sound/preview/1724228.html" type="audio/mpeg">
    </audio>
    <audio id="star-sound" preload="auto">
        <source src="https://www.aigei.com/sound/preview/1724228.html" type="audio/mpeg">
    </audio>
    <audio id="firework-sound" preload="auto">
        <source src="https://www.aigei.com/sound/preview/1724228.html" type="audio/mpeg">
    </audio>
    
    <script src="script.js"></script>
</body>
</html>
